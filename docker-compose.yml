services:
  attendance-app:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
