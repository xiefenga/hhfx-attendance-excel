name: Build desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-15
            arch: arm64
            artifact: desktop-macos-arm64
          - name: macOS Intel
            os: macos-15-intel
            arch: x64
            artifact: desktop-macos-x64
          - name: Windows x64
            os: windows-2025
            arch: x64
            artifact: desktop-windows-x64
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: |
          uv sync --frozen
          uv pip install --python .venv -r packaging/pyinstaller/requirements.txt

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Use tag as application version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Run Python tests
        run: uv run pytest -q

      - name: Run Python type checks
        run: uv run mypy attendance_core attendance_sidecar

      - name: Run frontend type checks
        run: npm run typecheck

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE != ''
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/attendance-certificate.p12"
          keychain_path="$RUNNER_TEMP/attendance-signing.keychain-db"
          printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychain -d user -s "$keychain_path"

      - name: Prepare Windows signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "attendance-certificate.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          "WINDOWS_CERTIFICATE_FILE=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build installers
        run: npm run make -- --arch=${{ matrix.arch }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
